<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сектор Газа | Яндекс Музыка</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(13,13,13,1) 100%);
            padding: 50px 20px;
            text-align: center;
            border-bottom: 4px solid #ff3333;
        }

        header h1 {
            font-size: 3.5rem;
            color: #ff3333;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.9);
            margin-bottom: 10px;
        }

        header p {
            font-style: italic;
            color: #888;
            font-size: 1.2rem;
        }

        .container {
            max-width: 700px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        h2 {
            font-size: 2rem;
            color: #fff;
            border-left: 5px solid #ff3333;
            padding-left: 15px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* Контейнер для плеера Яндекс Музыки */
        .music-player-wrap {
            background: #141414;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }

        .music-player-wrap:hover {
            border-color: #ff3333;
        }

        iframe {
            width: 100%;
            height: 450px;
            border: none;
            display: block;
            border-radius: 8px;
        }

        footer {
            background: #050505;
            text-align: center;
            padding: 25px;
            color: #444;
            font-size: 0.9rem;
            border-top: 1px solid #111;
        }
    </style>
</head>
<body>

    <header>
        <h1>Сектор Газа</h1>
        <p>«Хой жив, пока жива его музыка!»</p>
    </header>

    <div class="container">
        <section id="player-section">
            <h2>Альбом: Наркологический университет миллионов</h2>
            
            <div class="music-player-wrap">
                <iframe src="https://music.yandex.ru/iframe/#album/243761"></iframe>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Сектор Газа Плеер. Интеграция с Яндекс Музыкой на GitHub Pages.</p>
    </footer>

</body>
</html>
